name: Model Training Job (Python)

on:
  schedule:
    - cron: '0 7 * * 1' # weekly on Mondays at 7am UTC
  workflow_dispatch:

concurrency:
  # Same group as 12-ingest-*.yml so pushes to main never race.
  group: sysen5381-ingest-db-writer
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  train_python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Check file size limits
        run: |
          set -euo pipefail
          check_size_mb() {
            FILE="$1"
            MAX_MB="$2"
            if [ -f "$FILE" ]; then
              SIZE_BYTES=$(wc -c < "$FILE")
              SIZE_MB=$((SIZE_BYTES / 1024 / 1024))
              echo "File: $FILE | Size: ${SIZE_MB} MB | Limit: ${MAX_MB} MB"
              if [ "$SIZE_BYTES" -gt $((MAX_MB * 1024 * 1024)) ]; then
                echo "ERROR: $FILE exceeds ${MAX_MB} MB. Stop run before training."
                exit 1
              fi
            else
              echo "File not found yet (skip): $FILE"
            fi
          }
          check_size_mb "LABS/12_end/data/modelpy.json" 95
          check_size_mb "LABS/12_end/data/validationpy.json" 95

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: LABS/12_end/train-requirements.txt

      - name: Install dependencies
        run: pip install -r LABS/12_end/train-requirements.txt

      - name: Run training script
        working-directory: LABS/12_end
        run: python 02_train_model.py

      - name: Commit changes
        env:
          GIT_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add LABS/12_end/data/modelpy.json LABS/12_end/data/validationpy.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          TS="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git commit -m "chore(lab12): train python model (${TS})"
          git pull --rebase origin "${GIT_BRANCH}"
          git push origin "HEAD:${GIT_BRANCH}"
