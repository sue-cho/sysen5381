name: Deploy Shiny Python App to Posit Connect

on:
  push:
    branches: [main]
    paths:
      - 'HOMEWORK_1/**'
      - '.github/workflows/deploy-shinypy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Generate manifest for Connect
        run: |
          pip install rsconnect-python
          cd HOMEWORK_1 && rsconnect write-manifest shiny . --entrypoint HW1_app:app

      - name: Publish to Posit Connect
        uses: rstudio/actions/connect-publish@main
        with:
          url: ${{ secrets.CONNECT_SERVER }}
          api-key: ${{ secrets.CONNECT_API_KEY }}
          access-type: acl
          dir: HOMEWORK_1
          force: false
          show-logs: true
